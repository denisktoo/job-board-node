services:
  web:
    build: .
    container_name: job_board_node_web
    command: npm run dev
    volumes:
      - .:/app
      # Prevents the host's node_modules from overwriting the container's.
      # The container needs its own node_modules compiled for Linux.
      - /app/node_modules
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  db:
    image: postgres:15
    container_name: job_board_node_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    container_name: job_board_node_redis
    ports:
      - "6381:6379"

volumes:
  postgres_data:
